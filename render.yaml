services:
  - type: web
    name: boekgerust-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: .
    buildCommand: |
      npm ci --include=dev
      npx -w packages/api prisma generate
      npm run build -w @bookify/shared
      npm run build -w @bookify/api
    startCommand: node packages/api/dist/index.js
    healthCheckPath: /api/health
    autoDeploy: true
    branch: master
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: APP_URL
        sync: false
      - key: WIDGET_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
