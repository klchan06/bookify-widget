<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boekgerust</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 16px;
      margin: 0;
      min-height: 100vh;
    }
    .dev-container {
      max-width: 480px;
      width: 100%;
    }
    h1.dev-title {
      text-align: center;
      color: #1d1d1f;
      margin-bottom: 24px;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    #manage-root {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="dev-container">
    <div id="manage-root"></div>
    <div id="widget-root">
      <h1 class="dev-title">Boekgerust Widget Preview</h1>
      <boekgerust-widget
        salon-id="737066e5-0c1a-4534-a2f4-b1da63bc05b8"
        id="bk-widget"
      ></boekgerust-widget>
    </div>
  </div>

  <script type="module">
    const path = window.location.pathname;
    const manageMatch = path.match(/\/manage\/([^/]+)/);

    if (manageMatch) {
      document.getElementById('widget-root').style.display = 'none';
      const { mountManagePage } = await import('/src/manage-entry.ts');
      mountManagePage(document.getElementById('manage-root'), manageMatch[1]);
    } else {
      document.getElementById('manage-root').style.display = 'none';
      await import('/src/web-component.ts');
      document.getElementById('bk-widget').setAttribute('api-url',
        window.location.protocol + '//' + window.location.hostname + ':3001'
      );
    }
  </script>
</body>
</html>
