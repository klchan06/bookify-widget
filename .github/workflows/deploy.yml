name: Deploy

on:
  # Manual trigger only - automatic deploys disabled until production secrets are configured
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api
          - dashboard
          - widget

# ============================================================
# REQUIRED SECRETS (configure in GitHub repo Settings → Secrets):
#
# For API (Render):
#   RENDER_API_KEY      - Render account API key
#   RENDER_SERVICE_ID   - Render service ID for the API
#
# For Dashboard + Widget (Vercel):
#   VERCEL_TOKEN                  - Vercel API token
#   VERCEL_ORG_ID                 - Vercel organization ID
#   VERCEL_PROJECT_ID_DASHBOARD   - Vercel project ID for dashboard
#   VERCEL_PROJECT_ID_WIDGET      - Vercel project ID for widget
#
# Each job checks if its secrets are present and skips otherwise,
# so you can deploy components incrementally.
# ============================================================

jobs:
  deploy-api:
    name: Deploy API (Render)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'api' }}
    steps:
      - name: Check for Render secrets
        id: check
        run: |
          if [ -z "${{ secrets.RENDER_API_KEY }}" ] || [ -z "${{ secrets.RENDER_SERVICE_ID }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::Skipping API deploy - RENDER_API_KEY and RENDER_SERVICE_ID secrets not configured"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Render deploy
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys"

  deploy-dashboard:
    name: Deploy Dashboard (Vercel)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'dashboard' }}
    steps:
      - name: Check for Vercel secrets
        id: check
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::Skipping Dashboard deploy - VERCEL_TOKEN and VERCEL_PROJECT_ID_DASHBOARD secrets not configured"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Install Vercel CLI
        if: steps.check.outputs.skip == 'false'
        run: npm install -g vercel

      - name: Build dashboard
        if: steps.check.outputs.skip == 'false'
        run: npx turbo run build --filter=@bookify/dashboard

      - name: Deploy to Vercel
        if: steps.check.outputs.skip == 'false'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DASHBOARD }}
        run: |
          cd packages/dashboard
          vercel deploy --prod --token=$VERCEL_TOKEN --yes

  deploy-widget:
    name: Deploy Widget (Vercel CDN)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'widget' }}
    steps:
      - name: Check for Vercel secrets
        id: check
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID_WIDGET }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::Skipping Widget deploy - VERCEL_TOKEN and VERCEL_PROJECT_ID_WIDGET secrets not configured"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Install Vercel CLI
        if: steps.check.outputs.skip == 'false'
        run: npm install -g vercel

      - name: Build widget
        if: steps.check.outputs.skip == 'false'
        run: npx turbo run build --filter=@bookify/widget

      - name: Deploy to Vercel
        if: steps.check.outputs.skip == 'false'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WIDGET }}
        run: |
          cd packages/widget
          vercel deploy --prod --token=$VERCEL_TOKEN --yes
