name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-lint-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-lint-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-
            turbo-lint-${{ runner.os }}-

      - name: Lint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-build-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-build-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-
            turbo-build-${{ runner.os }}-

      - name: Build
        run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bookify
          POSTGRES_PASSWORD: bookify
          POSTGRES_DB: bookify_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bookify"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://bookify:bookify@localhost:5432/bookify_test
      JWT_SECRET: ci-test-secret
      NODE_ENV: development
      PORT: 3001
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx -w packages/api prisma generate

      - name: Push database schema
        run: npx -w packages/api prisma db push --skip-generate

      - name: Start API server
        run: npx -w packages/api tsx src/index.ts &
        env:
          CORS_ORIGINS: http://localhost:3002,http://localhost:3003

      - name: Wait for API
        run: |
          for i in $(seq 1 15); do
            curl -s http://localhost:3001/api/health && break
            sleep 1
          done

      - name: Run tests
        run: npx -w packages/api vitest run
