version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bookify
      POSTGRES_PASSWORD: bookify
      POSTGRES_DB: bookify
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookify"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://bookify:bookify@db:5432/bookify
      JWT_SECRET: dev-secret-change-in-production
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./packages/api/src:/app/packages/api/src
      - ./packages/shared/src:/app/packages/shared/src

  widget:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev --workspace=packages/widget"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - api

  dashboard:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev --workspace=packages/dashboard"
    ports:
      - "5174:5174"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  node_modules:
